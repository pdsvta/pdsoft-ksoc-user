    <script>
        function addFile() {
            var $td = $(event.target).closest('td');
            var $fileInput = $td.find('input[type="file"]');
            var $textInput = $td.find('input[type="text"][readonly]');
            $fileInput.click();

            $fileInput.off('change').on('change', function () {
                var fileName = this.files.length > 0 ? this.files[0].name : '';
                $textInput.val(fileName);
            });
        }
    </script>
