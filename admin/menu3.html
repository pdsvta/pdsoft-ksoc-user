    <style>
        :root {
            --muted: #f6f7f7;
            --border: #dedede;
            --btn-bg: #4a4a4a;
            --btn-txt: #fff;
            --danger: #e74c3c;
            --link: #3498db;
        }

        body {
            font-family: "Segoe UI", Arial;
            margin: 20px;
            background: #fff;
        }

        h1 {
            margin: 0 0 12px 0;
            font-size: 20px;
            color: #333;
        }

        .controls {
            margin-bottom: 12px;
        }

        button.control {
            margin-right: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #fff;
            cursor: pointer;
        }

        .table-wrap {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        thead th {
            background: var(--muted);
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 16px;
        }

        tbody tr:nth-child(even) {
            background: #fbfbfb;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
            font-size: 16px;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .level-2 .tree-cell {
            margin-left: 10px;
        }

        .toggle-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 0;
            background: var(--btn-bg);
            color: var(--btn-txt);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
        }

        .level-1 .toggle-btn {
            background-color: #4a4a4a;
        }

        .toggle-btn.empty {
            background: transparent;
            color: #bbb;
            cursor: default;
        }

        .menu-title {
            flex: 1;
            min-width: 0;
        }

        .level-1 .menu-title {
            padding-left: 8px;
        }

        .level-2 .menu-title {
            padding-left: 28px;
        }

        .level-3 .menu-title {
            padding-left: 48px;
        }

        .level-4 .menu-title {
            padding-left: 68px;
        }

        .actions a {
            margin-right: 10px;
            text-decoration: none;
            color: var(--link);
            font-size: 16px;
        }

        .actions a.delete {
            color: var(--danger);
        }

        tr.hidden {
            display: none;
        }

        tbody tr:hover {
            background: #f3f9f9;
        }

        .add-sub {
            background: #444;
            color: #fff;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 14px;
            text-decoration: none;
            margin-left: 8px;
        }

        .add-sub:hover {
            background: #444;
            color: #fff;
            font-weight: 600;
        }
    </style>
</head>

    <script>
        (function () {
            const tbody = document.getElementById("menuBody");

            // Build parent → children index
            function buildIndex() {
                const rows = [...tbody.querySelectorAll("tr")];
                const idx = {};
                rows.forEach(r => {
                    const id = r.dataset.id;
                    const parent = r.dataset.parent || "0";
                    if (!idx[parent]) idx[parent] = [];
                    idx[parent].push(id);
                });
                return idx;
            }

            function rowById(id) {
                return tbody.querySelector(`tr[data-id="${id}"]`);
            }

            function setChildrenVisibility(id, show) {
                const idx = buildIndex();
                const children = idx[id] || [];
                children.forEach(childId => {
                    const row = rowById(childId);
                    if (!row) return;
                    if (show) { row.classList.remove("hidden"); }
                    else { row.classList.add("hidden"); }
                    if (!show) {
                        // collapse descendants too
                        const btn = row.querySelector(`.toggle-btn[data-id="${childId}"]`);
                        if (btn) { btn.setAttribute("aria-expanded", "false"); btn.textContent = "▸"; }
                        setChildrenVisibility(childId, false);
                    }
                });
            }

            // Toggle single row
            tbody.addEventListener("click", e => {
                const btn = e.target.closest(".toggle-btn");
                if (!btn || btn.classList.contains("empty")) return;

                const id = btn.dataset.id;
                const expanded = btn.getAttribute("aria-expanded") === "true";

                if (expanded) {
                    btn.setAttribute("aria-expanded", "false");
                    btn.textContent = "▸";
                    setChildrenVisibility(id, false);
                } else {
                    btn.setAttribute("aria-expanded", "true");
                    btn.textContent = "▾";
                    const idx = buildIndex();
                    (idx[id] || []).forEach(cid => {
                        rowById(cid).classList.remove("hidden");
                    });
                }
            });

            // Expand all
            document.getElementById("expandAll").addEventListener("click", () => {
                const rows = [...tbody.querySelectorAll("tr")];
                rows.forEach(r => {
                    r.classList.remove("hidden");
                    const id = r.dataset.id;
                    const btn = r.querySelector(`.toggle-btn[data-id="${id}"]`);
                    if (btn && !btn.classList.contains("empty")) {
                        btn.setAttribute("aria-expanded", "true");
                        btn.textContent = "▾";
                    }
                });
            });

            // Collapse all
            document.getElementById("collapseAll").addEventListener("click", () => {
                const rows = [...tbody.querySelectorAll("tr")];
                rows.forEach(r => {
                    if (r.dataset.parent !== "0") r.classList.add("hidden");
                    const id = r.dataset.id;
                    const btn = r.querySelector(`.toggle-btn[data-id="${id}"]`);
                    if (btn && !btn.classList.contains("empty")) {
                        btn.setAttribute("aria-expanded", "false");
                        btn.textContent = "▸";
                    }
                });
            });

        })();
    </script>
